    <circle cx="661" cy="319" r="2" fill="white" opacity="0.05"/>
    <circle cx="649" cy="291" r="2" fill="white" opacity="0.05"/>
    <circle cx="135" cy="385" r="5" fill="white" opacity="0.05"/>
