    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/><line x1="0" y1="80" x2="1200" y2="80" stroke="white" stroke-width="1"/><line x1="0" y1="160" x2="1200" y2="160" stroke="white" stroke-width="1"/><line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/><line x1="0" y1="320" x2="1200" y2="320" stroke="white" stroke-width="1"/><line x1="0" y1="400" x2="1200" y2="400" stroke="white" stroke-width="1"/><line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/><line x1="0" y1="560" x2="1200" y2="560" stroke="white" stroke-width="1"/>
