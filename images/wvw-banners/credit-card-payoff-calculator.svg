    <linearGradient id="bottom-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.7"/>
