      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="50%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="40%" r="70%">
