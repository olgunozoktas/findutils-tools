<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bg-travel-budget-calculator" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- Overlay radial for depth -->
    <radialGradient id="glow-travel-budget-calculator" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom text fade -->
    <linearGradient id="bottom-fade-travel-budget-calculator" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" rx="16" fill="url(#bg-travel-budget-calculator)"/>
  <rect width="1200" height="630" rx="16" fill="url(#glow-travel-budget-calculator)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="630" stroke="white" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="630" stroke="white" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="630" stroke="white" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="630" stroke="white" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="630" stroke="white" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="630" stroke="white" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/><line x1="1020" y1="0" x2="1020" y2="630" stroke="white" stroke-width="1"/><line x1="1080" y1="0" x2="1080" y2="630" stroke="white" stroke-width="1"/><line x1="1140" y1="0" x2="1140" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/><line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="1"/><line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/><line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="1"/><line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/><line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/><line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/><line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/><line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/><line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-width="1"/><line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative elements -->
  
            <!-- Airplane -->
            <g transform="translate(860, 120) rotate(-15)" opacity="0.15">
                <path d="M0 0 L80 -30 L120 -20 L60 10 L100 60 L80 55 L40 20 L10 50 L0 40 L20 15 Z" fill="white" stroke="none"/>
            </g>
            <!-- Globe -->
            <circle cx="950" cy="280" r="100" fill="none" stroke="white" stroke-width="2" opacity="0.12"/>
            <ellipse cx="950" cy="280" rx="50" ry="100" fill="none" stroke="white" stroke-width="1.5" opacity="0.10"/>
            <line x1="850" y1="280" x2="1050" y2="280" stroke="white" stroke-width="1.5" opacity="0.10"/>
            <line x1="950" y1="180" x2="950" y2="380" stroke="white" stroke-width="1.5" opacity="0.10"/>
            <!-- Compass -->
            <g transform="translate(180, 380)" opacity="0.08">
                <circle cx="0" cy="0" r="60" fill="none" stroke="white" stroke-width="3"/>
                <polygon points="0,-45 8,0 0,15 -8,0" fill="white"/>
                <polygon points="0,45 8,0 0,-15 -8,0" fill="white" opacity="0.5"/>
            </g>
            <!-- Location pins -->
            <g opacity="0.10">
                <g transform="translate(750, 150)">
                    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 21 12 21s12-12 12-21c0-6.6-5.4-12-12-12zm0 16.2c-2.3 0-4.2-1.9-4.2-4.2s1.9-4.2 4.2-4.2 4.2 1.9 4.2 4.2-1.9 4.2-4.2 4.2z" fill="white" transform="scale(2)"/>
                </g>
                <g transform="translate(1050, 380)">
                    <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 21 12 21s12-12 12-21c0-6.6-5.4-12-12-12zm0 16.2c-2.3 0-4.2-1.9-4.2-4.2s1.9-4.2 4.2-4.2 4.2 1.9 4.2 4.2-1.9 4.2-4.2 4.2z" fill="white" transform="scale(1.5)"/>
                </g>
            </g>
            <!-- Dotted route line -->
            <path d="M790 170 Q900 250 970 300 Q1040 350 1070 400" fill="none" stroke="white" stroke-width="2" stroke-dasharray="6,8" opacity="0.10"/>
        
  
            <!-- Currency symbols floating -->
            <text x="100" y="180" font-family="system-ui" font-size="42" fill="white" opacity="0.06" transform="rotate(-20, 100, 180)">$</text>
            <text x="300" y="130" font-family="system-ui" font-size="36" fill="white" opacity="0.05" transform="rotate(10, 300, 130)">EUR</text>
            <text x="500" y="160" font-family="system-ui" font-size="30" fill="white" opacity="0.04" transform="rotate(-5, 500, 160)">JPY</text>
            <!-- Bar chart hint -->
            <g transform="translate(80, 440)" opacity="0.06">
                <rect x="0" y="40" width="20" height="60" rx="3" fill="white"/>
                <rect x="28" y="20" width="20" height="80" rx="3" fill="white"/>
                <rect x="56" y="50" width="20" height="50" rx="3" fill="white"/>
                <rect x="84" y="10" width="20" height="90" rx="3" fill="white"/>
                <rect x="112" y="35" width="20" height="65" rx="3" fill="white"/>
            </g>
        

  <!-- Bottom gradient overlay for text readability -->
  <rect y="410" width="1200" height="220" fill="url(#bottom-fade-travel-budget-calculator)" rx="0"/>

  <!-- FindUtils badge -->
  <g transform="translate(60, 50)">
    <rect width="120" height="32" rx="16" fill="white" opacity="0.15"/>
    <text x="60" y="21" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.9">FindUtils</text>
  </g>

  <!-- Title -->
  <text x="60" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">
    Travel Budget Calculator
  </text>

  <!-- Subtitle -->
  <text x="60" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.8">
    Plan your perfect trip. Estimate flights, hotels, food &amp; activities.
  </text>

  <!-- Accent line -->
  <rect x="60" y="485" width="80" height="4" rx="2" fill="#5eead4" opacity="0.7"/>
</svg>