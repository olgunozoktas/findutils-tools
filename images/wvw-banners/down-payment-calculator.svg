<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bg-down-payment-calculator" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Overlay radial for depth -->
    <radialGradient id="glow-down-payment-calculator" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom text fade -->
    <linearGradient id="bottom-fade-down-payment-calculator" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" rx="16" fill="url(#bg-down-payment-calculator)"/>
  <rect width="1200" height="630" rx="16" fill="url(#glow-down-payment-calculator)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="630" stroke="white" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="630" stroke="white" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="630" stroke="white" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="630" stroke="white" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="630" stroke="white" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="630" stroke="white" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="630" stroke="white" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="630" stroke="white" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="630" stroke="white" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="630" stroke="white" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="630" stroke="white" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="630" stroke="white" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="630" stroke="white" stroke-width="1"/><line x1="1020" y1="0" x2="1020" y2="630" stroke="white" stroke-width="1"/><line x1="1080" y1="0" x2="1080" y2="630" stroke="white" stroke-width="1"/><line x1="1140" y1="0" x2="1140" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="1"/><line x1="0" y1="60" x2="1200" y2="60" stroke="white" stroke-width="1"/><line x1="0" y1="120" x2="1200" y2="120" stroke="white" stroke-width="1"/><line x1="0" y1="180" x2="1200" y2="180" stroke="white" stroke-width="1"/><line x1="0" y1="240" x2="1200" y2="240" stroke="white" stroke-width="1"/><line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/><line x1="0" y1="360" x2="1200" y2="360" stroke="white" stroke-width="1"/><line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/><line x1="0" y1="480" x2="1200" y2="480" stroke="white" stroke-width="1"/><line x1="0" y1="540" x2="1200" y2="540" stroke="white" stroke-width="1"/><line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative elements -->
  
            <!-- House -->
            <g transform="translate(880, 140)" opacity="0.15">
                <path d="M80 0 L160 65 L160 160 L0 160 L0 65 Z" fill="white" stroke="none"/>
                <rect x="55" y="100" width="50" height="60" rx="3" fill="currentColor" opacity="0.3"/>
                <rect x="20" y="80" width="30" height="30" rx="2" fill="currentColor" opacity="0.2"/>
                <rect x="110" y="80" width="30" height="30" rx="2" fill="currentColor" opacity="0.2"/>
            </g>
            <!-- Percentage circles -->
            <g opacity="0.08">
                <circle cx="750" cy="200" r="35" fill="none" stroke="white" stroke-width="3"/>
                <text x="750" y="208" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="white">3%</text>
            </g>
            <g opacity="0.10">
                <circle cx="830" cy="300" r="40" fill="none" stroke="white" stroke-width="3"/>
                <text x="830" y="308" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="white">10%</text>
            </g>
            <g opacity="0.12">
                <circle cx="1060" cy="350" r="50" fill="none" stroke="white" stroke-width="3"/>
                <text x="1060" y="360" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="white">20%</text>
            </g>
            <!-- Key icon -->
            <g transform="translate(1020, 150) rotate(45)" opacity="0.08">
                <circle cx="0" cy="0" r="20" fill="none" stroke="white" stroke-width="4"/>
                <line x1="20" y1="0" x2="70" y2="0" stroke="white" stroke-width="4"/>
                <line x1="55" y1="0" x2="55" y2="15" stroke="white" stroke-width="4"/>
                <line x1="65" y1="0" x2="65" y2="12" stroke="white" stroke-width="4"/>
            </g>
        
  
            <!-- Savings growth chart -->
            <g transform="translate(80, 380)" opacity="0.06">
                <path d="M0 100 L30 85 L60 90 L90 60 L120 50 L150 30 L180 10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <circle cx="180" cy="10" r="5" fill="white"/>
            </g>
            <!-- Dollar signs -->
            <text x="120" y="200" font-family="system-ui" font-size="48" fill="white" opacity="0.05" transform="rotate(-15, 120, 200)">$</text>
            <text x="350" y="150" font-family="system-ui" font-size="36" fill="white" opacity="0.04">$</text>
            <!-- Coin stack -->
            <g transform="translate(200, 420)" opacity="0.05">
                <ellipse cx="0" cy="0" rx="25" ry="8" fill="white"/>
                <ellipse cx="0" cy="-10" rx="25" ry="8" fill="white"/>
                <ellipse cx="0" cy="-20" rx="25" ry="8" fill="white"/>
                <ellipse cx="0" cy="-30" rx="25" ry="8" fill="white"/>
            </g>
        

  <!-- Bottom gradient overlay for text readability -->
  <rect y="410" width="1200" height="220" fill="url(#bottom-fade-down-payment-calculator)" rx="0"/>

  <!-- FindUtils badge -->
  <g transform="translate(60, 50)">
    <rect width="120" height="32" rx="16" fill="white" opacity="0.15"/>
    <text x="60" y="21" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.9">FindUtils</text>
  </g>

  <!-- Title -->
  <text x="60" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">
    Down Payment Calculator
  </text>

  <!-- Subtitle -->
  <text x="60" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.8">
    Compare 3%, 5%, 10% &amp; 20% options. See closing costs &amp; PMI.
  </text>

  <!-- Accent line -->
  <rect x="60" y="485" width="80" height="4" rx="2" fill="#93c5fd" opacity="0.7"/>
</svg>